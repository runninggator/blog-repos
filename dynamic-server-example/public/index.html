<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>
<script>
    function sendRequest() {
        fetch('/exampleEndpoint', {
            method: 'GET',
            credentials: 'include',
            headers: {
            'foo': 'bar'
            }
        })
        .then(response => response.text())
        .then(data => {
            console.log('Response from server:', data)
        })
    }
</script>
</head>
<body>
    <h1>Hello, World!</h1>
    <p>This is a bare bones HTML template.</p>
    <button onclick="sendRequest()">Click to send request</button>
</body>
</html>
