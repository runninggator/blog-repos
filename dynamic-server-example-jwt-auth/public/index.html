<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Title</title>
    <script>
        function sendRequest() {
            fetch('https://www.jimmy-localhost.com:3000/exampleEndpoint', {
                method: 'GET',
                credentials: 'include',
                headers: {
                'foo': 'bar'
                }
            })
            .then(response => response.text())
            .then(data => {
                console.log('Response from server:', data)
            })
        }
    </script>
</head>
<body>
    <h1>Hello, World!</h1>
    <p>This is a bare bones HTML template.</p>
    <button onclick="sendRequest()">Click to send request</button>
    <form id="loginForm">
        <input type="text" placeholder="username" id="username" />
        <input type="text" placeholder="password" id="password" />
        <button type="submit">Login</button>
    </form>
    <button onclick="testJwt()">Click to test your JWT</button>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async function(event) {
            event.preventDefault()
            const username = document.getElementById('username').value
            const password = document.getElementById('password').value
            jwt = await fetch('https://www.jimmy-localhost.com:3000/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ username, password }),
            })
            .then(response => response.json())
            .then(data => {
                console.log('JWT from server:', data)
                return data.jwt
            })
        })
        function testJwt() {
            fetch('https://www.jimmy-localhost.com:3000/testJwt', {
                method: 'POST',
                credentials: 'include',
                headers: {
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({ jwt }),
            })
            .then(response => response.text())
            .then(data => {
                console.log('Response from server:', data)
            })
        }
    </script>
</body>
</html>
